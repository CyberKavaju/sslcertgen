{% macro btn_primary(label, button_id=None, button_type='button', icon=None, extra_classes='', attrs='') -%}
<button
  {% if button_id %}id="{{ button_id }}"{% endif %}
  type="{{ button_type }}"
  class="inline-flex min-h-12 items-center justify-center gap-2 rounded-2xl bg-primary px-5 py-3 text-sm font-bold text-on-primary transition-all duration-200 hover:bg-sky-300 disabled:cursor-not-allowed disabled:opacity-60 {{ extra_classes }}"
  {{ attrs|safe }}
>
  {% if icon %}<span class="material-symbols-outlined text-base">{{ icon }}</span>{% endif %}
  <span>{{ label }}</span>
</button>
{%- endmacro %}

{% macro btn_ghost(label, button_id=None, button_type='button', icon=None, extra_classes='', attrs='') -%}
<button
  {% if button_id %}id="{{ button_id }}"{% endif %}
  type="{{ button_type }}"
  class="glass-card inline-flex min-h-12 items-center justify-center gap-2 rounded-2xl px-4 py-3 text-sm font-medium text-on-surface transition-all duration-200 hover:border-primary/30 hover:text-primary disabled:cursor-not-allowed disabled:opacity-50 {{ extra_classes }}"
  {{ attrs|safe }}
>
  {% if icon %}<span class="material-symbols-outlined text-base">{{ icon }}</span>{% endif %}
  <span>{{ label }}</span>
</button>
{%- endmacro %}
