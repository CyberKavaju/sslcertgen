{% macro glass_panel(title, description='', panel_id=None, extra_classes='') -%}
<section
  {% if panel_id %}id="{{ panel_id }}"{% endif %}
  class="glass-panel rounded-[1.75rem] p-5 sm:p-6 {{ extra_classes }}"
>
  <div class="flex items-start justify-between gap-4">
    <div>
      <p class="text-xs font-semibold uppercase tracking-[0.28em] text-primary">Output</p>
      <h2 class="mt-2 text-xl font-bold tracking-tight text-on-surface">{{ title }}</h2>
      {% if description %}
      <p class="mt-2 text-sm text-on-surface-variant">{{ description }}</p>
      {% endif %}
    </div>
  </div>
  <div class="mt-5">
    {{ caller() }}
  </div>
</section>
{%- endmacro %}
