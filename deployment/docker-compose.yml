services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      FLASK_CONFIG: development
      FLASK_ENV: development
      HTTPS_ENFORCEMENT_ENABLED: "false"
      HSTS_ENABLED: "false"

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile.local
    depends_on:
      - app
    volumes:
      - ./nginx/nginx.local.conf:/etc/nginx/conf.d/default.conf:ro
      - ssl-local:/etc/nginx/ssl
    ports:
      - "80:80"
      - "443:443"

volumes:
  ssl-local:
