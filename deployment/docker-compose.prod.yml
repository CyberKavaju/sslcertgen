services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      FLASK_CONFIG: production
      FLASK_ENV: production
      HTTPS_ENFORCEMENT_ENABLED: "false"
      HSTS_ENABLED: "false"

  nginx:
    image: nginx:alpine
    depends_on:
      - app
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./nginx/nginx.prod.conf.template:/etc/nginx/templates/nginx.prod.conf.template:ro
      - certbot-certs:/etc/letsencrypt
    command: >-
      /bin/sh -c "apk add --no-cache gettext >/dev/null &&
      envsubst '$DOMAIN' < /etc/nginx/templates/nginx.prod.conf.template > /etc/nginx/conf.d/default.conf &&
      nginx -g 'daemon off;'"
    ports:
      - "80:80"
      - "443:443"

volumes:
  certbot-certs:
  certbot-var:
